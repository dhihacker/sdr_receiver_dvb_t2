name: Build SDR DVB-T2 (Windows)

on:
  push:
    branches: [ "main" ]

  # 🔥 This adds the "Run workflow" button in GitHub Actions UI
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # -----------------------------------
      # 1. Checkout source code
      # -----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------
      # 2. Setup MSVC (Visual Studio tools)
      # -----------------------------------
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # -----------------------------------
      # 3. Install Qt 5.15
      # -----------------------------------
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "5.15.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2019_64"

      # -----------------------------------
      # 4. Install FFTW (dependency)
      # -----------------------------------
      - name: Install FFTW
        run: |
          choco install fftw -y

      # -----------------------------------
      # 5. Create build folder + run qmake
      # -----------------------------------
      - name: Configure project
        run: |
          mkdir build
          cd build
          qmake ../src/sdr_receiver_dvb_t2_v2.pro CONFIG+=release

      # -----------------------------------
      # 6. Build project
      # -----------------------------------
      - name: Build project
        run: |
          cd build
          nmake

      # -----------------------------------
      # 7. Collect output EXE
      # -----------------------------------
      - name: Prepare output
        run: |
          mkdir output
          copy build\bin\sdr_receiver_dvb_t2_v2.exe output\

      # -----------------------------------
      # 8. Upload artifact (downloadable EXE)
      # -----------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdr_receiver_dvb_t2_win_x64
          path: output/
